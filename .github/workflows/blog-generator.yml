name: Daily Blog Post Generator

on:
  workflow_dispatch:        # triggered by cron-job.org at 7am, 12pm, 5pm UTC

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push
        run: |
          git config user.name "Bodystrands Blog Bot"
          git config user.email "storenavaria@gmail.com"
          git add data/blog-posts.json
          git diff --staged --quiet || git commit -m "Add blog post [skip ci]"
          git pull --rebase origin main
          git push
