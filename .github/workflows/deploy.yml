name: Deploy to Vercel

on:
  push:
    branches:
      - main

# Only one deploy to production at a time. Without this, rapid successive pushes (e.g.
# several admin-panel saves plus a few code commits within a few minutes) each start their
# own `vercel deploy` in parallel — they contend with each other against the same Vercel
# project and can hang indefinitely instead of failing cleanly. A new push now cancels
# whatever deploy is still in flight rather than piling up alongside it.
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --archive=tgz --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
