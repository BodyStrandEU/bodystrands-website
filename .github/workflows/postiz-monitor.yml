name: Postiz Post Monitor

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check and recover failed posts
        env:
          POSTIZ_API_KEY: ${{ secrets.POSTIZ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, subprocess, urllib.request, urllib.error

          API_KEY   = os.environ["POSTIZ_API_KEY"]
          GH_TOKEN  = os.environ["GH_TOKEN"]
          REPO      = os.environ["REPO"]

          from datetime import datetime, timezone, timedelta
          now   = datetime.now(timezone.utc)
          start = now.replace(day=1).strftime("%Y-%m-%dT00:00:00Z")
          end   = (now + timedelta(days=60)).strftime("%Y-%m-%dT00:00:00Z")

          def postiz(path, method="GET", body=None):
              url = f"https://api.postiz.com/public/v1{path}"
              data = json.dumps(body).encode() if body else None
              req  = urllib.request.Request(url, data=data, method=method,
                      headers={"Authorization": API_KEY, "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()}

          def github(path, method="GET", body=None):
              url  = f"https://api.github.com{path}"
              data = json.dumps(body).encode() if body else None
              req  = urllib.request.Request(url, data=data, method=method,
                      headers={"Authorization": f"Bearer {GH_TOKEN}",
                               "Accept": "application/vnd.github+json",
                               "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return {"error": e.read().decode()}

          # 1. Fetch all posts
          resp  = postiz(f"/posts?startDate={start}&endDate={end}")
          posts = resp.get("posts", [])
          errors = [p for p in posts if p.get("state") == "ERROR"]

          if not errors:
              print("✅ No failed posts found.")
              exit(0)

          print(f"Found {len(errors)} failed post(s).")

          needs_manual = []
          requeued     = []

          for p in errors:
              pid      = p["id"]
              platform = (p.get("integration") or {}).get("providerIdentifier", "unknown")
              date     = p.get("publishDate", "")[:16]
              content  = p.get("content", "")[:80]

              if platform == "tiktok":
                  print(f"⚠️  TikTok error [{date}] {pid} — needs manual re-auth")
                  needs_manual.append({"pid": pid, "date": date, "content": content})
              else:
                  print(f"🔄 Attempting requeue: [{platform}] {pid}")
                  result = postiz(f"/posts/{pid}/status", method="PUT", body={"status": "schedule"})
                  if "error" not in result:
                      print(f"   ✅ Requeued {pid}")
                      requeued.append(f"- [{platform}] {date} | {pid}")
                  else:
                      print(f"   ❌ Could not requeue: {result}")
                      needs_manual.append({"pid": pid, "platform": platform, "date": date, "content": content})

          # 2. Create GitHub issue for anything that needs manual attention
          if needs_manual:
              failed_lines = "\n".join(
                  f"- {m['date']} [{m.get('platform','tiktok')}] `{m['pid']}`\n  > {m['content']}"
                  for m in needs_manual
              )
              requeued_section = ""
              if requeued:
                  requeued_section = "### Auto-requeued (no action needed)\n" + "\n".join(requeued)

              body = f"""## Social media posts need attention

          One or more posts failed and cannot be auto-recovered.

          ### Failed posts
          {failed_lines}

          ### How to fix (TikTok token expired)
          1. Go to **platform.postiz.com** → Settings → Channels → TikTok → **Reconnect**
          2. Log in with the Bodystrands TikTok account
          3. Once reconnected, let Claude know to reschedule the failed posts

          {requeued_section}

          ---
          *Auto-generated by Postiz Monitor*"""

              # Check for existing open alert
              search = github(f"/search/issues?q=repo:{REPO}+is:issue+is:open+TikTok+token")
              if search.get("total_count", 0) == 0:
                  result = github(f"/repos/{REPO}/issues", method="POST",
                                  body={"title": "⚠️ Postiz: TikTok token expired — reconnect needed",
                                        "body": body})
                  if "number" in result:
                      print(f"📬 GitHub issue #{result['number']} created — you'll get an email.")
                  else:
                      print(f"❌ Issue creation failed: {result}")
              else:
                  print(f"ℹ️  Alert issue already open, skipping duplicate.")
          PYEOF
