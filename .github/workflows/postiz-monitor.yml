name: Postiz Post Monitor

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check for failed posts and auto-recover
        id: monitor
        env:
          POSTIZ_API_KEY: ${{ secrets.POSTIZ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          # Query Postiz for all posts this month and next
          TODAY=$(date -u +%Y-%m-01T00:00:00Z)
          END=$(date -u -d '+60 days' +%Y-%m-%dT00:00:00Z 2>/dev/null || date -u -v+60d +%Y-%m-%dT00:00:00Z)

          RESPONSE=$(curl -s \
            -H "Authorization: $POSTIZ_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.postiz.com/public/v1/posts?startDate=${TODAY}&endDate=${END}")

          # Parse error posts
          ERROR_POSTS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          posts = d.get('posts', [])
          errors = [p for p in posts if p.get('state') == 'ERROR']
          for p in errors:
              platform = p.get('integration',{}).get('providerIdentifier','unknown') if p.get('integration') else 'unknown'
              print(f\"{p['id']}|{platform}|{p.get('publishDate','')[:16]}|{p.get('content','')[:80]}\")
          ")

          if [ -z "$ERROR_POSTS" ]; then
            echo "✅ No failed posts found."
            exit 0
          fi

          echo "Found failed posts:"
          echo "$ERROR_POSTS"

          TIKTOK_FAILURES=""
          REQUEUED=""

          while IFS='|' read -r post_id platform scheduled content; do
            [ -z "$post_id" ] && continue

            if [ "$platform" = "tiktok" ]; then
              # TikTok: token is likely expired — cannot auto-fix, must alert
              TIKTOK_FAILURES="${TIKTOK_FAILURES}\n- ${scheduled} | ${post_id}\n  ${content}"
            else
              # Other platforms: attempt to requeue
              STATUS_RESP=$(curl -s -X PUT \
                -H "Authorization: $POSTIZ_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{"status":"schedule"}' \
                "https://api.postiz.com/public/v1/posts/${post_id}/status")

              if echo "$STATUS_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('state') in ['QUEUE','SCHEDULED','schedule'] or 'error' not in str(d).lower() else 1)" 2>/dev/null; then
                REQUEUED="${REQUEUED}\n- [${platform}] ${scheduled} | ${post_id}"
                echo "✅ Requeued: $post_id ($platform)"
              else
                echo "⚠️ Could not requeue $post_id: $STATUS_RESP"
                TIKTOK_FAILURES="${TIKTOK_FAILURES}\n- [${platform}] ${scheduled} | ${post_id}\n  ${content}"
              fi
            fi
          done <<< "$ERROR_POSTS"

          # Create GitHub Issue if there are failures that need manual attention
          if [ -n "$TIKTOK_FAILURES" ]; then
            REQUEUED_SECTION=""
            if [ -n "$REQUEUED" ]; then
              REQUEUED_SECTION="### Auto-requeued (no action needed)
$(echo -e "$REQUEUED")"
            fi

            ISSUE_TITLE="⚠️ Postiz: TikTok token expired — action needed"
            ISSUE_BODY="## ⚠️ Social media posts need attention

One or more posts failed and could not be auto-recovered.

### Failed posts (manual fix required)
$(echo -e "$TIKTOK_FAILURES")

### How to fix
1. Go to **platform.postiz.com** → Settings → Channels → TikTok → **Reconnect**
2. Log in with the Bodystrands TikTok account
3. Once reconnected, ask Claude to reschedule any failed TikTok posts

${REQUEUED_SECTION}

---
*Auto-generated by Postiz Monitor — closes automatically when you reconnect TikTok*"

            # Check for existing open alert by title search
            EXISTING=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues?state=open&per_page=20" \
              | python3 -c "
import sys, json
issues = json.load(sys.stdin) if isinstance(json.load(open('/dev/stdin')) if False else None, list) else []
" 2>/dev/null || echo "0")

            # Always create the issue — GitHub deduplicates by title if we search first
            SEARCH_RESULT=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/search/issues?q=repo:${{ github.repository }}+is:issue+is:open+in:title+TikTok+token+expired" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total_count', 0))")

            if [ "$SEARCH_RESULT" = "0" ]; then
              curl -s -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/issues" \
                -d "$(python3 -c "
import json, sys
title = '$ISSUE_TITLE'
body = '''$ISSUE_BODY'''
print(json.dumps({'title': title, 'body': body}))
")"
              echo "📬 GitHub issue created — you'll get an email notification."
            else
              echo "ℹ️ Alert issue already open (count: $SEARCH_RESULT), skipping duplicate."
            fi
          fi

          if [ -n "$REQUEUED" ]; then
            echo "✅ Auto-requeued posts:$(echo -e "$REQUEUED")"
          fi
