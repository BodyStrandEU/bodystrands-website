name: Social Duplicate Post Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run duplicate checker
        id: check
        env:
          POSTIZ_API_KEY: ${{ secrets.POSTIZ_API_KEY }}
        run: |
          node scripts/check-social-duplicates.mjs > check_output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true
      - name: Open issue if violations found
        if: steps.check.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(head -c 60000 check_output.txt)
          gh issue create \
            --title "⚠️ Duplicate/repeated product posts found in social schedule" \
            --body "The scheduled-post duplicate checker found same-product-in-a-row posts on Instagram/Facebook, or repeated content on Pinterest, somewhere in the next 60 days.

          \`\`\`
          $BODY
          \`\`\`

          Run \`node scripts/check-social-duplicates.mjs\` locally (with \`POSTIZ_API_KEY\` set) for the full detail, then delete and replace the flagged posts before they publish.

          ---
          *Auto-generated by Social Duplicate Post Check*"
      - name: Pass
        if: steps.check.outputs.exit_code == '0'
        run: echo "✅ No duplicates found."
